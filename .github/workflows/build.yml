name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$(which flutter | sed 's|/bin/flutter||')" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          cat android/local.properties

      - name: Build APK
        run: flutter build apk --release --verbose 2>&1 | tail -200
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EstimPro-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: EstimPro v1.0.${{ github.run_number }}
          files: build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## EstimPro — App estimation immobilière
            **Faucigny Immobilier by Efficity — Jérémy Moraga**

            📱 Télécharge et installe `app-release.apk` sur ton Samsung Galaxy S
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
