name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release 2>&1 | tee /tmp/build.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            ERRS=$(grep -E "error:|FAILURE|Exception|Could not resolve|Caused by" /tmp/build.log | head -10 | tr '\n' '|')
            echo "::error::BUILD FAILED: $ERRS"
            exit $EXIT
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EstimPro-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: EstimPro v1.0.${{ github.run_number }}
          files: build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## EstimPro — App estimation immobilière
            **Faucigny Immobilier by Efficity — Jérémy Moraga**

            📱 Télécharge et installe `app-release.apk` sur ton Samsung Galaxy S
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
